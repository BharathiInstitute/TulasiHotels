# ────────────────────────────────────────────────────────
# Loop 2 — Continuous Deployment Pipeline
# Deploys to Firebase Hosting (web) and builds release APK
# Triggered on pushes to main branch only (after CI passes)
# ────────────────────────────────────────────────────────
name: "Loop 2 — Deploy"

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - web
          - android
          - both
        default: both

# Cancel in-progress runs for the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Deploy Web to Firebase Hosting ───
  deploy-web:
    name: "Deploy Web → Firebase Hosting"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'web' || github.event.inputs.target == 'both' }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web (release)
        run: flutter build web --release --dart-define=RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting:login1-aa21c
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

  # ─── Build Release APK ───
  build-release-apk:
    name: "Build Release APK"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'android' || github.event.inputs.target == 'both' }}
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate Android signing secrets
        run: |
          [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] || (echo "Missing GitHub secret: KEYSTORE_BASE64" && exit 1)
          [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ] || (echo "Missing GitHub secret: KEYSTORE_PASSWORD" && exit 1)
          [ -n "${{ secrets.KEY_PASSWORD }}" ] || (echo "Missing GitHub secret: KEY_PASSWORD" && exit 1)
          [ -n "${{ secrets.KEY_ALIAS }}" ] || (echo "Missing GitHub secret: KEY_ALIAS" && exit 1)
          [ -n "${{ secrets.EXPECTED_UPLOAD_SHA1 }}" ] || (echo "Missing GitHub secret: EXPECTED_UPLOAD_SHA1" && exit 1)

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          expectedSha1=${{ secrets.EXPECTED_UPLOAD_SHA1 }}
          EOF

      - name: Build Release APK
        run: flutter build apk --release --dart-define=RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}

      - name: Build App Bundle (AAB) for Play Store
        run: flutter build appbundle --release --dart-define=RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}

      - name: Verify AAB upload key SHA1
        run: |
          ACTUAL_SHA1=$(keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | awk -F': ' '/SHA1:/{print $2; exit}' | tr '[:lower:]' '[:upper:]')
          EXPECTED_SHA1=$(echo "${{ secrets.EXPECTED_UPLOAD_SHA1 }}" | tr '[:lower:]' '[:upper:]')
          echo "AAB SHA1: $ACTUAL_SHA1"
          echo "Expected: $EXPECTED_SHA1"
          [ "$ACTUAL_SHA1" = "$EXPECTED_SHA1" ] || (echo "AAB signing SHA1 mismatch" && exit 1)

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # Optional: Upload to Play Store internal track via fastlane
      # Uncomment when fastlane is configured
      # - name: Upload to Play Store (internal track)
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
      #     packageName: in.liteapp.tulasihotels
      #     releaseFiles: build/app/outputs/bundle/release/app-release.aab
      #     track: internal
      #     status: completed

  # ─── Deploy Cloud Functions ───
  deploy-functions:
    name: "Deploy Cloud Functions"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'both' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Audit dependencies
        run: cd functions && npm audit --audit-level=high || echo "⚠️ Vulnerabilities found (non-blocking)"

      - name: Build functions
        run: cd functions && npm run build

      - name: Run Cloud Functions tests
        run: cd functions && npm test

      - name: Validate Razorpay secrets
        run: |
          [ -n "${{ secrets.RAZORPAY_KEY_ID }}" ] || (echo "Missing GitHub secret: RAZORPAY_KEY_ID" && exit 1)
          [ -n "${{ secrets.RAZORPAY_KEY_SECRET }}" ] || (echo "Missing GitHub secret: RAZORPAY_KEY_SECRET" && exit 1)
          [ -n "${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" ] || (echo "Missing GitHub secret: RAZORPAY_WEBHOOK_SECRET" && exit 1)

      - name: Create functions .env from secrets
        run: |
          cat > functions/.env <<EOF
          BREVO_EMAIL=support@restaurants.tulasierp.com
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          EOF

      - name: Deploy Cloud Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

  # ─── Deploy Firestore Rules & Indexes ───
  deploy-rules:
    name: "Deploy Firestore Rules"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'both' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firestore Rules & Indexes
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules,firestore:indexes,storage
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
